# Génère github-metrics.svg (lowlighter/metrics) et le committe sur main.
# Marche tout de suite avec le GITHUB_TOKEN par défaut.
# Pour des stats plus riches (contributions privées, etc.) : ajoute un secret
# METRICS_TOKEN (Personal Access Token classique, scope `repo` + `read:user`) —
# il sera automatiquement préféré au token par défaut.
name: metrics

on:
  schedule:
    - cron: "15 0 * * *"   # 1x/jour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Paris
          config_order: base.header, base.activity, base.community, languages, habits, achievements, base.repositories, base.metadata
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
