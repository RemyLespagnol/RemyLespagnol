# Met à jour la section "Recent activity" du README (entre les marqueurs
# START_SECTION:activity / END_SECTION:activity). Aucun secret requis.
name: activity

on:
  schedule:
    - cron: "45 0 * * *"   # 1x/jour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Update recent activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "chore: update recent activity [skip ci]"
          MAX_LINES: 5
