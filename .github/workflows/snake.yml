# Génère l'animation "snake" qui mange tes contributions.
# Le SVG est commit sur la branche `output` et référencé par le README.
name: generate snake

on:
  schedule:
    - cron: "0 */12 * * *"   # 2x/jour
  workflow_dispatch:          # bouton "Run" manuel
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: RemyLespagnol
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake.gif?color_snake=#7aa2f7&color_dots=#1a1b26,#33467c,#7aa2f7,#c0caf5,#ffffff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
